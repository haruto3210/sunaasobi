<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>高速エラーログ（ジョーク）</title>
<style>
  body {
    margin: 0;
    background: #000;
    color: #0f0;
    font-family: Consolas, monospace;
    font-size: 14px;
  }
  #log {
    padding: 10px;
    white-space: pre-wrap;
  }
</style>
</head>
<body>

<div id="log"></div>

<script>
const log = document.getElementById("log");

const msgs = [
  "ERROR: Coffee temperature too low.",
  "WARN : Happiness level unstable.",
  "INFO : System recommends a break.",
  "ERROR: Motivation.dll not responding.",
  "WARN : User detected staring at screen.",
  "INFO : Everything is actually fine.",
  "ERROR: JokeEngine overflow detected.",
  "WARN : This is全部ジョークです。",
];

function addLine() {
  const now = new Date().toISOString();
  const msg = msgs[Math.floor(Math.random() * msgs.length)];
  log.textContent += `[${now}] ${msg}\n`;

  // 長くなりすぎたら末尾だけ残す
  if (log.textContent.length > 12000) {
    log.textContent = log.textContent.slice(-8000);
  }

  window.scrollTo(0, document.body.scrollHeight);
}

// 超高速（1msごとに1行）
setInterval(addLine, 1);
</script>

</body>
</html>
