<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>【教育用】偽サポート警告の例</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #e6e6e6;
  }

  /* 上部の赤い警告帯 */
  .top-alert {
    background-color: #cc0000;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
  }

  /* 中央の警告ウィンドウ風ボックス */
  .center-box {
    background: white;
    width: 60%;
    margin: 50px auto;
    padding: 30px;
    border: 4px solid red;
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
    text-align: center;
  }

  .fake-logo {
    width: 60px;
    height: 60px;
    background: #0078d4;
    margin: 0 auto 20px;
  }

  .title {
    font-size: 24px;
    color: red;
    font-weight: bold;
  }

  .message {
    margin-top: 20px;
    font-size: 16px;
    line-height: 1.6;
  }

  .call-box {
    margin-top: 30px;
    font-size: 22px;
    color: blue;
    font-weight: bold;
  }

  .button {
    margin-top: 25px;
    padding: 12px 25px;
    background: #0078d4;
    color: white;
    border: none;
    font-size: 18px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="top-alert">
  【教育用デモ】警告：システムに問題が検出されました（※実際の警告ではありません）
</div>

<div class="center-box">
  <div class="fake-logo"></div>

  <div class="title">疑似サポート警告（教育用）</div>

  <div class="message">
    この画面は、詐欺ページがどのような見た目で作られるかを学ぶためのサンプルです。<br>
    実際のサポートではありません。
  </div>

  <div class="message">
    ・赤色の強調表示<br>
    ・公式風のレイアウト<br>
    ・電話番号への誘導<br>
    などが詐欺でよく使われます。
  </div>

  <div class="call-box">
    架空のサポート番号：000-0000-0000
  </div>

  <button class="button">（教育用）問い合わせボタン</button>
</div>

</body>
</html>
