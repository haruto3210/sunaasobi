<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>押せないボタン</title>
<style>
  body {
    margin: 0;
    font-family: sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #btn {
    padding: 12px 24px;
    font-size: 18px;
    position: absolute;
    cursor: pointer;
  }
</style>
</head>
<body>

<button id="btn">クリックして！</button>

<script>
const btn = document.getElementById("btn");

function moveButton() {
  const x = Math.random() * (window.innerWidth - 150);
  const y = Math.random() * (window.innerHeight - 60);
  btn.style.left = x + "px";
  btn.style.top = y + "px";
}

btn.addEventListener("mouseover", moveButton);

btn.addEventListener("click", () => {
  alert("よく頑張りました。これはただのドッキリです。");
});

moveButton();
</script>

</body>
</html>
