<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ランダム警告（ジョーク）</title>
<style>
  body {
    margin: 0;
    background: #000;
    color: #f33;
    font-family: "Consolas", "Courier New", monospace;
    padding: 20px;
    font-size: 18px;
  }
  #log {
    white-space: pre-wrap;
  }
</style>
</head>
<body>

<div id="log">システム監視中...\n</div>

<script>
const warnings = [
  "警告: 予期しない動作を検出…（かもしれません）",
  "注意: システムがあなたを見つめています。",
  "警告: 何かが起きているような気がします。",
  "注意: これはジョークの可能性があります。",
  "警告: 深刻な問題…は特にありません。",
  "注意: コーヒーの摂取量が不足しています。",
  "警告: あなたのPCは今日も元気です。",
  "注意: そろそろネタバレが近いです。"
];

const log = document.getElementById("log");
let count = 0;

function addWarning() {
  const msg = warnings[Math.floor(Math.random() * warnings.length)];
  log.textContent += msg + "\n";
  count++;

  if (count === 8) {
    log.textContent += "\n==============================\n";
    log.textContent += "  これはジョーク画面です。\n";
    log.textContent += "  PCはハッキングされていません。\n";
    log.textContent += "  ブラウザを閉じれば終わりです。\n";
    log.textContent += "==============================\n";
  }
}

setInterval(addWarning, 800);
</script>

</body>
</html>
