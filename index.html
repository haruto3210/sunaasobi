<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>GeoGuessr風ゲーム（無料再現版）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
    #view { width: 100%; height: 220px; object-fit: cover; background: #000; }
    #hint { padding: 10px; background: #f5f5f5; border-bottom: 1px solid #ddd; }
    #map { flex: 1; }
    #controls { padding: 10px; border-top: 1px solid #ddd; display: flex; gap: 10px; align-items: center; }
    #result { margin-left: auto; font-weight: bold; }
  </style>
</head>
<body>

  <img id="view" src="" alt="view">
  <div id="hint">ヒント: 読み込み中...</div>
  <div id="map"></div>

  <div id="controls">
    <span id="roundInfo">ラウンド 1 / 5</span>
    <span id="status">マップをクリックして推測してね</span>
    <span id="result"></span>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const locations = [
      {
        name: "東京駅",
        lat: 35.681236, lng: 139.767125,
        hint: "赤レンガの駅舎が特徴。",
        image: "https://upload.wikimedia.org/wikipedia/commons/1/12/Tokyo_Station_2012.jpg"
      },
      {
        name: "道頓堀",
        lat: 34.668722, lng: 135.501297,
        hint: "グリコの看板で有名。",
        image: "https://upload.wikimedia.org/wikipedia/commons/6/6f/Dotonbori_Ebisu_Bridge.jpg"
      },
      {
        name: "清水寺",
        lat: 34.994856, lng: 135.785046,
        hint: "舞台からの景色が有名。",
        image: "https://upload.wikimedia.org/wikipedia/commons/0/0c/Kiyomizu-dera%2C_Kyoto%2C_November_2016_-01.jpg"
      }
    ];

    let currentLocation = null;
    let map, markerGuess, markerAnswer;

    let round = 1;
    let totalScore = 0;
    const maxRounds = 5;

    function distanceKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a =
        Math.sin(dLat/2)**2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function scoreFromDistance(km) {
      const maxDist = 20000;
      const ratio = Math.max(0, 1 - km / maxDist);
      return Math.round(5000 * ratio);
    }

    function pickRandomLocation() {
      const idx = Math.floor(Math.random() * locations.length);
      currentLocation = locations[idx];

      document.getElementById("view").src = currentLocation.image;
      document.getElementById("hint").textContent = "ヒント: " + currentLocation.hint;
      document.getElementById("status").textContent = "マップをクリックして推測してね";
      document.getElementById("result").textContent = "";

      if (markerGuess) map.removeLayer(markerGuess);
      if (markerAnswer) map.removeLayer(markerAnswer);

      map.setView([20, 0], 2);
      document.getElementById("roundInfo").textContent = `ラウンド ${round} / ${maxRounds}`;
    }

    function initMap() {
      map = L.map("map").setView([20, 0], 2);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19 }).addTo(map);
      map.on("click", onMapClick);
    }

    function onMapClick(e) {
      const { lat, lng } = e.latlng;

      if (markerGuess) map.removeLayer(markerGuess);
      markerGuess = L.marker([lat, lng]).addTo(map);

      const d = distanceKm(lat, lng, currentLocation.lat, currentLocation.lng);
      const score = scoreFromDistance(d);
      totalScore += score;

      document.getElementById("result").textContent =
        `距離: ${d.toFixed(1)} km / スコア: ${score}`;

      if (markerAnswer) map.removeLayer(markerAnswer);
      markerAnswer = L.marker([currentLocation.lat, currentLocation.lng]).addTo(map);

      const group = L.featureGroup([markerGuess, markerAnswer]);
      map.fitBounds(group.getBounds().pad(0.5));

      setTimeout(() => {
        round++;
        if (round > maxRounds) {
          alert(`ゲーム終了！合計スコア: ${totalScore}`);
          round = 1;
          totalScore = 0;
        }
        pickRandomLocation();
      }, 2000);
    }

    document.addEventListener("DOMContentLoaded", () => {
      initMap();
      pickRandomLocation();
    });
  </script>

</body>
</html>
