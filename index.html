<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>フェイク端末（ジョーク）</title>
<style>
  body {
    margin: 0;
    background: #000;
    color: #0f0;
    font-family: "Consolas", "Courier New", monospace;
    padding: 10px;
    font-size: 14px;
  }
  #screen {
    white-space: pre-wrap;
  }
</style>
</head>
<body>

<div id="screen"></div>

<script>
const lines = [
  "接続中... 192.168.0.1",
  "認証試行中...",
  "アクセス権限を確認しています...",
  "データをスキャン中...",
  "",
  "結果: 特に問題は見つかりませんでした。",
  "",
  "==============================",
  "  これはジョーク画面です。",
  "  あなたのPCはハッキングされていません。",
  "  ブラウザを閉じれば何も残りません。",
  "=============================="
];

const screen = document.getElementById("screen");
let index = 0;

function printNextLine() {
  if (index < lines.length) {
    screen.textContent += lines[index] + "\n";
    index++;
    setTimeout(printNextLine, 500);
  }
}

printNextLine();
</script>

</body>
</html>
